name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Build DB image (postgis + pgvector)
        run: docker build -f infra/db/Dockerfile -t uotp-db .

      - name: Start Postgres
        run: |
          docker run -d --name uotp-db \
            -e POSTGRES_USER=uotp -e POSTGRES_PASSWORD=uotp -e POSTGRES_DB=uotp \
            -p 5432:5432 uotp-db
          for i in $(seq 1 30); do
            docker exec uotp-db pg_isready -U uotp -d uotp && break
            sleep 2
          done
          docker exec uotp-db psql -U uotp -d uotp -c "CREATE DATABASE uotp_test"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Ruff
        working-directory: backend
        run: ruff check .

      - name: Tests + coverage
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://uotp:uotp@localhost:5432/uotp_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web
        working-directory: web
        run: npm install
      - name: Typecheck web
        working-directory: web
        run: npm run typecheck
      - name: Build web
        working-directory: web
        run: npm run build

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare stack env
        run: cp infra/.env.example infra/.env

      - name: Start backend stack (db, redis, minio, backend)
        run: docker compose -f infra/docker-compose.yml up -d --build db redis minio backend

      - name: Wait for backend, migrate and seed
        run: |
          for i in $(seq 1 40); do
            curl -sf http://localhost:8000/health && break
            sleep 3
          done
          docker compose -f infra/docker-compose.yml exec -T backend alembic upgrade head
          docker compose -f infra/docker-compose.yml exec -T backend python -m app.seed

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web
        working-directory: web
        run: npm install

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run web dev server
        working-directory: web
        run: npm run dev &

      - name: Wait for web
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && break
            sleep 2
          done

      - name: E2E (Playwright)
        working-directory: web
        env:
          E2E_NO_SERVER: "1"
          E2E_BASE_URL: http://localhost:5173
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          if-no-files-found: ignore

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs backend

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile
        working-directory: mobile
        run: npm install
      - name: Typecheck mobile
        working-directory: mobile
        run: npm run typecheck
      - name: Unit tests (jest)
        working-directory: mobile
        run: npm test -- --ci
